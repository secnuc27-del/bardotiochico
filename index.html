<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bar do Tio Chico - Encomendas</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <header>
        <h1>Bar do Tio Chico 🍻</h1>
        <p>O Ponto de Encontro da Colônia</p>
    </header>

    <main>
        <section>
            <h2>Bebidas Geladas</h2>
            <div class="produto">
                <span>Cerveja Latinha (Amstel/Antarctica)</span>
                <div class="controles">
                    <button onclick="mudarQtd('cerveja', -1)">-</button>
                    <input type="number" id="cerveja" value="0" readonly>
                    <button onclick="mudarQtd('cerveja', 1)">+</button>
                </div>
            </div>
            <div class="produto">
                <span>Coca-Cola 2 Litros</span>
                <div class="controles">
                    <button onclick="mudarQtd('coca2l', -1)">-</button>
                    <input type="number" id="coca2l" value="0" readonly>
                    <button onclick="mudarQtd('coca2l', 1)">+</button>
                </div>
            </div>
        </section>

        <section>
            <h2>Salgadinhos e Outros</h2>
            <div class="produto">
                <span>Skiny / Salgadinhos</span>
                <div class="controles">
                    <button onclick="mudarQtd('skiny', -1)">-</button>
                    <input type="number" id="skiny" value="0" readonly>
                    <button onclick="mudarQtd('skiny', 1)">+</button>
                </div>
            </div>
        </section>

        <div class="total-caixa">
            <h3>TOTAL: R$ <span id="valor-total">0,00</span></h3>
        </div>

        <button onclick="enviarPedido(1)" class="btn-whats">Pedir no WhatsApp 1 📱</button>
    </main>
    <script src="script.js"></script>
</body>
</html>
